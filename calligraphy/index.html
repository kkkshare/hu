<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>颜体书法练习助手 - 多宝塔碑</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Ma+Shan+Zheng&family=Zhi+Mang+Xing&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Serif SC', serif;
            background-color: #f4f1ea; /* 宣纸色 */
            background-image: url('https://www.transparenttextures.com/patterns/paper.png');
        }
        .mi-zi-ge {
            background-image: 
                linear-gradient(rgba(180, 0, 0, 0.2) 1px, transparent 1px),
                linear-gradient(90deg, rgba(180, 0, 0, 0.2) 1px, transparent 1px),
                linear-gradient(45deg, transparent 49%, rgba(180, 0, 0, 0.1) 49%, rgba(180, 0, 0, 0.1) 51%, transparent 51%),
                linear-gradient(-45deg, transparent 49%, rgba(180, 0, 0, 0.1) 49%, rgba(180, 0, 0, 0.1) 51%, transparent 51%);
            background-size: 100% 100%, 100% 100%, 100% 100%, 100% 100%;
            border: 2px solid rgba(180, 0, 0, 0.3);
            position: relative;
        }
        .tian-zi-ge {
            background-image: 
                linear-gradient(rgba(180, 0, 0, 0.2) 1px, transparent 1px),
                linear-gradient(90deg, rgba(180, 0, 0, 0.2) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%;
            border: 2px solid rgba(180, 0, 0, 0.3);
            position: relative;
        }
        .no-grid {
            background-image: none;
            border: 2px solid rgba(180, 0, 0, 0.1);
        }
        #copyStage:fullscreen {
            background-color: white;
            padding: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #copyStage:fullscreen .char-img {
            max-height: 90vh;
            max-width: 90vw;
        }
        #copyStage:fullscreen .calligraphy-font {
            font-size: 30rem;
        }
        .mi-zi-ge::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: rgba(180, 0, 0, 0.1);
        }
        .mi-zi-ge::after {
            content: '';
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 1px;
            background: rgba(180, 0, 0, 0.1);
        }
        .char-img {
            mix-blend-mode: multiply;
            filter: contrast(1.2) brightness(0.9);
        }
        .calligraphy-font {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 8rem;
            color: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            width: 100%;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }
        .source-tag {
            position: absolute;
            top: 4px;
            right: 4px;
            font-size: 10px;
            padding: 1px 4px;
            border-radius: 4px;
        }
        .tag-authentic {
            background-color: rgba(180, 0, 0, 0.1);
            color: #b40000;
            border: 0.5px solid rgba(180, 0, 0, 0.2);
        }
        .tag-simulated {
            background-color: rgba(100, 100, 100, 0.1);
            color: #666;
            border: 0.5px solid rgba(100, 100, 100, 0.2);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4 md:p-8">
    <header class="w-full max-w-4xl text-center mb-8">
        <h1 class="text-3xl md:text-4xl font-bold text-gray-800 mb-2">颜体书法练习助手</h1>
        <p class="text-gray-600 italic">—— 临摹名家风采，领略大唐气象 ——</p>
    </header>

    <main class="w-full max-w-2xl bg-white/80 backdrop-blur-sm rounded-xl shadow-lg p-6 md:p-10 border border-amber-100">
        <!-- 搜索区域 -->
        <div class="flex flex-col gap-4 mb-10">
            <label for="charInput" class="text-lg font-medium text-gray-700">请输入想要练习的汉字：</label>
            <div class="flex gap-2">
                <input type="text" id="charInput" maxlength="10" placeholder="例如：永、和、九、年" 
                    class="flex-1 px-4 py-3 rounded-lg border border-amber-200 focus:ring-2 focus:ring-amber-400 focus:outline-none text-xl tracking-widest">
                <button id="searchBtn" class="bg-amber-700 hover:bg-amber-800 text-white px-8 py-3 rounded-lg transition-colors font-bold">
                    搜索
                </button>
            </div>
            <p class="text-sm text-gray-500">当前字帖：<span class="font-bold text-amber-900">颜真卿 · 《多宝塔碑》</span></p>
        </div>

        <!-- 结果展示区域 -->
        <div id="resultContainer" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 items-start justify-center">
            <!-- 初始欢迎或加载状态 -->
            <div class="col-span-full text-center py-10 text-gray-400">
                <p>输入汉字后，名家真迹将在此呈现</p>
            </div>
        </div>
    </main>

    <!-- 底部说明 -->
    <footer class="mt-auto py-8 text-gray-500 text-sm text-center">
        <p>© 2026 颜体书法练习助手 · 丸子特别奉献</p>
        <p class="mt-2">心如止水，方能落笔有神</p>
    </footer>

    <!-- 详情弹窗 (Modal) -->
    <div id="detailModal" class="fixed inset-0 bg-black/80 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-[#f4f1ea] max-w-4xl w-full rounded-2xl overflow-hidden shadow-2xl relative">
            <button id="closeModal" class="absolute top-4 right-4 text-gray-500 hover:text-black text-2xl">✕</button>
            <div class="p-8 flex flex-col items-center">
                <div class="mi-zi-ge w-64 h-64 md:w-96 md:h-96 bg-white mb-6 flex items-center justify-center overflow-hidden relative" id="copyStage">
                    <div id="modalImgContainer" class="w-full h-full flex items-center justify-center"></div>
                </div>
                <div class="text-center w-full">
                    <h2 id="modalTitle" class="text-2xl font-bold text-gray-800 mb-2"></h2>
                    <p id="modalDesc" class="text-gray-600 mb-6"></p>
                    
                    <!-- 电子拷贝台控制区 -->
                    <div class="bg-white/50 p-4 rounded-xl border border-amber-200 mb-6 w-full max-w-md mx-auto">
                        <p class="text-sm font-bold text-amber-900 mb-3">电子拷贝台控制</p>
                        <div class="flex flex-col gap-4">
                            <div class="flex items-center gap-4">
                                <span class="text-xs text-gray-500 w-12">透明度</span>
                                <input type="range" id="opacitySlider" min="0.1" max="1" step="0.1" value="1" class="flex-1 accent-amber-700">
                            </div>
                            <div class="flex items-center gap-4">
                                <span class="text-xs text-gray-500 w-12">格线</span>
                                <div class="flex gap-2">
                                    <button onclick="setGrid('mi')" class="grid-btn px-3 py-1 text-xs bg-amber-700 text-white rounded">米字</button>
                                    <button onclick="setGrid('tian')" class="grid-btn px-3 py-1 text-xs bg-white border border-amber-200 rounded">田字</button>
                                    <button onclick="setGrid('none')" class="grid-btn px-3 py-1 text-xs bg-white border border-amber-200 rounded">无格</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="mt-6 flex justify-center gap-4">
                        <button id="fullScreenBtn" class="px-8 py-3 border border-amber-700 text-amber-700 rounded-full hover:bg-amber-700 hover:text-white transition-all font-bold">
                            全屏临摹
                        </button>
                        <button class="px-8 py-3 bg-amber-700 text-white rounded-full hover:bg-amber-800 shadow-md font-bold">
                            加入收藏
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
