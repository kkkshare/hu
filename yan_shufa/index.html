<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>颜体书法练习 v2.1 - 巨幕导航版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
    <style>
        :root {
            --mi-color: #ef4444; /* 红色米字格 */
            --char-color: #1a1a1a; /* 墨色 */
        }
        
        @font-face {
            font-family: 'DongFangDaKai';
            /* 阿里妈妈东方大楷：基于《多宝塔碑》算法生成的专业书法字库 */
            src: url('https://puhui.oss-cn-hangzhou.aliyuncs.com/AlimamaDongFangDaKai/AlimamaDongFangDaKai-Regular.woff2') format('woff2');
            font-display: swap;
        }

        .calligraphy-font {
            font-family: 'DongFangDaKai', serif;
            font-weight: normal;
        }

        /* 强制巨幕容器 */
        .svg-container {
            width: 100%;
            aspect-ratio: 1 / 1;
            max-width: 600px;
            margin: 0 auto;
            position: relative;
        }

        /* 搜索结果网格：锁死 280px 最小宽度 */
        #resultContainer {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
            width: 100%;
        }

        /* 隐藏滚动条但保持功能 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* 全屏临摹模式 */
        #fullscreenOverlay {
            display: none;
            position: fixed;
            inset: 0;
            background: white;
            z-index: 100;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans">

    <!-- 导航栏 -->
    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <h1 class="text-xl font-bold text-red-600 flex items-center">
                <span class="mr-2">🖌️</span> 颜体练字 2.0
            </h1>
            <div class="text-xs text-gray-400 font-mono">Build: 20260213_v2.1_NAV</div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 py-8">
        <!-- 搜索区域 -->
        <div class="mb-12 text-center">
            <div class="inline-flex w-full max-w-xl shadow-lg rounded-2xl overflow-hidden border-2 border-red-100 bg-white">
                <input type="text" id="searchInput" 
                    class="flex-1 px-6 py-4 text-lg focus:outline-none" 
                    placeholder="输入想要练习的汉字（如：兴旺发达）"
                    maxlength="10">
                <button id="searchBtn" class="bg-red-600 text-white px-8 py-4 font-bold hover:bg-red-700 transition-colors">
                    检索
                </button>
            </div>
            <div class="mt-4 flex items-center justify-center gap-3">
                <p class="text-gray-500 text-sm">提示：点击汉字可进入“全屏巨幕临摹模式”</p>
                <button id="clearBtn" class="text-sm px-3 py-1.5 rounded-full border border-gray-200 text-gray-500 hover:text-red-600 hover:border-red-200 transition-colors">清空</button>
            </div>
            <p id="resultMeta" class="mt-2 text-xs text-gray-400"></p>
        </div>

        <!-- 结果展示 -->
        <div id="resultContainer">
            <!-- 初始引导内容 -->
            <div class="col-span-full flex flex-col items-center justify-center py-20 text-gray-300">
                <div class="text-8xl mb-4 opacity-20 calligraphy-font">颜</div>
                <p class="text-lg">请输入汉字开启矢量巨幕练习</p>
            </div>
        </div>
    </main>

    <!-- 全屏临摹层 -->
    <div id="fullscreenOverlay">
        <button id="closeFullscreen" class="absolute top-6 right-6 text-4xl text-gray-400 hover:text-red-600 transition-colors">
            &times;
        </button>
        <div id="fullscreenContent" class="w-full max-w-[90vh] aspect-square"></div>
        <div class="mt-8 text-center">
            <h2 id="fullscreenChar" class="text-2xl font-bold text-gray-800">汉字详情</h2>
            <p id="fullscreenIndex" class="text-gray-400 text-sm mt-1"></p>
            <div class="mt-4 flex items-center justify-center gap-3">
                <button id="prevChar" class="px-4 py-2 rounded-xl border border-gray-200 text-gray-600 hover:border-red-200 hover:text-red-600 transition-colors">上一个</button>
                <button id="nextChar" class="px-4 py-2 rounded-xl border border-gray-200 text-gray-600 hover:border-red-200 hover:text-red-600 transition-colors">下一个</button>
            </div>
            <p class="text-gray-300 text-xs mt-3">提示：键盘左右键可切换，Esc 可退出</p>
        </div>
    </div>

    <!-- 脚本 -->
    <script src="js/app_v2.js"></script>
</body>
</html>
