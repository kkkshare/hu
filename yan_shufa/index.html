<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>颜体书法练习助手 - 多宝塔碑</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Ma+Shan+Zheng&family=Zhi+Mang+Xing&family=Long+Cang&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }
        html, body {
            overflow-x: hidden;
            width: 100%;
            margin: 0;
            padding: 0;
            position: relative;
        }
        body {
            font-family: 'Noto Serif SC', serif;
            background-color: #f4f1ea; /* 宣纸色 */
            background-image: url('https://www.transparenttextures.com/patterns/paper.png');
            -webkit-tap-highlight-color: transparent;
        }
        .mi-zi-ge {
            background-image: 
                linear-gradient(rgba(180, 0, 0, 0.2) 1px, transparent 1px),
                linear-gradient(90deg, rgba(180, 0, 0, 0.2) 1px, transparent 1px),
                linear-gradient(45deg, transparent 49%, rgba(180, 0, 0, 0.1) 49%, rgba(180, 0, 0, 0.1) 51%, transparent 51%),
                linear-gradient(-45deg, transparent 49%, rgba(180, 0, 0, 0.1) 49%, rgba(180, 0, 0, 0.1) 51%, transparent 51%);
            background-size: 100% 100%, 100% 100%, 100% 100%, 100% 100%;
            border: 2px solid rgba(180, 0, 0, 0.3);
            position: relative;
        }
        .tian-zi-ge {
            background-image: 
                linear-gradient(rgba(180, 0, 0, 0.2) 1px, transparent 1px),
                linear-gradient(90deg, rgba(180, 0, 0, 0.2) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%;
            border: 2px solid rgba(180, 0, 0, 0.3);
            position: relative;
        }
        .no-grid {
            background-image: none;
            border: 2px solid rgba(180, 0, 0, 0.1);
        }
        #copyStage:fullscreen {
            background-color: white;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        #copyStage:fullscreen .char-img {
            max-height: 90vh;
            max-width: 90vw;
            object-contain: contain;
        }
        #copyStage:fullscreen .calligraphy-font {
            font-size: min(50vw, 30rem);
        }
        .mi-zi-ge::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: rgba(180, 0, 0, 0.1);
        }
        .mi-zi-ge::after {
            content: '';
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 1px;
            background: rgba(180, 0, 0, 0.1);
        }
        .char-img {
            /* 移除可能导致图片不可见的混合模式，改为更安全的显示方式 */
            filter: contrast(1.1) brightness(1.0);
            max-width: 100%;
            max-height: 100%;
        }
        .calligraphy-font {
            /* 使用更具书法感的马善政字体作为兜底，但保持清晰度 */
            font-family: 'Ma Shan Zheng', 'Zhi Mang Xing', cursive;
            font-weight: 400;
            font-size: 6rem;
            color: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            width: 100%;
            text-shadow: 1px 1px 1px rgba(0,0,0,0.05);
        }
        @media (min-width: 768px) {
            .calligraphy-font {
                font-size: 8rem;
            }
        }
        .source-tag {
            position: absolute;
            top: 4px;
            right: 4px;
            font-size: 10px;
            padding: 1px 4px;
            border-radius: 4px;
            z-index: 10;
        }
        .tag-authentic {
            background-color: rgba(180, 0, 0, 0.1);
            color: #b40000;
            border: 0.5px solid rgba(180, 0, 0, 0.2);
        }
        .tag-simulated {
            background-color: rgba(100, 100, 100, 0.1);
            color: #666;
            border: 0.5px solid rgba(100, 100, 100, 0.2);
        }
        /* 移动端滚动条美化 */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #d4d4d8;
            border-radius: 10px;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-1 md:p-8 w-full">
    <header class="w-full max-w-4xl text-center my-2 md:my-8 px-2">
        <h1 class="text-xl md:text-4xl font-bold text-gray-800 mb-1 md:mb-2">颜体书法练习助手</h1>
        <p class="text-gray-600 italic text-[10px] md:text-base">—— 临摹名家风采，领略大唐气象 ——</p>
    </header>

    <main class="w-full max-w-2xl bg-white/80 backdrop-blur-sm rounded-xl shadow-lg p-2 md:p-10 border border-amber-100 box-border">
        <!-- 搜索区域 -->
        <div class="flex flex-col gap-2 md:gap-4 mb-6 md:mb-8">
            <label for="charInput" class="text-sm md:text-lg font-medium text-gray-700">请输入想要练习的汉字：</label>
            <div class="flex flex-col sm:flex-row gap-2">
                <input type="text" id="charInput" maxlength="10" placeholder="永、和、九、年" 
                    class="w-full sm:flex-1 px-4 py-2 md:py-3 rounded-lg border border-amber-200 focus:ring-2 focus:ring-amber-400 focus:outline-none text-base md:text-xl tracking-widest">
                <button id="searchBtn" class="w-full sm:w-auto bg-amber-700 hover:bg-amber-800 text-white px-8 py-2 md:py-3 rounded-lg transition-colors font-bold active:scale-95 whitespace-nowrap">
                    搜索
                </button>
            </div>
            <p class="text-[10px] md:text-sm text-gray-500">当前字帖：<span class="font-bold text-amber-900">颜真卿 · 《多宝塔碑》</span></p>
        </div>

        <!-- 结果展示区域 -->
        <div id="resultContainer" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-3 lg:grid-cols-4 gap-3 md:gap-6 items-start justify-items-center">
            <!-- 初始欢迎或加载状态 -->
            <div class="col-span-full text-center py-10 text-gray-400">
                <p>输入汉字后，名家真迹将在此呈现</p>
            </div>
        </div>
    </main>

    <!-- 底部说明 -->
    <footer class="mt-auto py-6 text-gray-500 text-xs md:text-sm text-center">
        <div class="mb-4 inline-block px-4 py-1 bg-red-100 text-red-600 rounded-full font-bold text-[10px] animate-pulse">
            最后更新: 2026-02-10 12:20 (v9 终极强制刷新版)
        </div>
        <p>© 2026 颜体书法练习助手 · 丸子特别奉献</p>
        <p class="mt-1">心如止水，方能落笔有神</p>
        <p class="text-[8px] mt-2 opacity-30">Build: 20260210_v9_ULTRA_PATH_RENAME</p>
    </footer>

    <!-- 详情弹窗 (Modal) -->
    <div id="detailModal" class="fixed inset-0 bg-black/90 hidden z-50 flex items-center justify-center p-0 sm:p-4 overflow-y-auto">
        <div class="bg-[#f4f1ea] w-full min-h-full sm:min-h-0 sm:max-w-xl sm:rounded-2xl overflow-hidden shadow-2xl relative flex flex-col">
            <button id="closeModal" class="absolute top-2 right-2 text-gray-500 hover:text-black text-2xl z-20 bg-white/80 rounded-full w-10 h-10 flex items-center justify-center shadow-sm">✕</button>
            <div class="p-4 md:p-8 flex flex-col items-center flex-1">
                <div class="mi-zi-ge w-full aspect-square max-w-[300px] md:max-w-[384px] bg-white mb-4 md:mb-6 flex items-center justify-center overflow-hidden relative shadow-inner" id="copyStage">
                    <div id="modalImgContainer" class="w-full h-full flex items-center justify-center"></div>
                </div>
                <div class="text-center w-full max-w-sm">
                    <h2 id="modalTitle" class="text-lg md:text-2xl font-bold text-gray-800 mb-1"></h2>
                    <p id="modalDesc" class="text-[11px] md:text-sm text-gray-600 mb-4 px-2"></p>
                    
                    <!-- 电子拷贝台控制区 -->
                    <div class="bg-white/50 p-3 rounded-xl border border-amber-200 mb-4 w-full">
                        <p class="text-xs font-bold text-amber-900 mb-2">电子拷贝台控制</p>
                        <div class="flex flex-col gap-3">
                            <div class="flex items-center gap-4">
                                <span class="text-[10px] text-gray-500 w-10">透明度</span>
                                <input type="range" id="opacitySlider" min="0.1" max="1" step="0.1" value="1" class="flex-1 accent-amber-700">
                            </div>
                            <div class="flex items-center gap-4">
                                <span class="text-[10px] text-gray-500 w-10">格线</span>
                                <div class="flex gap-2">
                                    <button onclick="setGrid('mi')" class="grid-btn px-3 py-1 text-[10px] bg-amber-700 text-white rounded shadow-sm">米字</button>
                                    <button onclick="setGrid('tian')" class="grid-btn px-3 py-1 text-[10px] bg-white border border-amber-200 rounded shadow-sm">田字</button>
                                    <button onclick="setGrid('none')" class="grid-btn px-3 py-1 text-[10px] bg-white border border-amber-200 rounded shadow-sm">无格</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="flex flex-col gap-2 mt-2 px-4">
                        <button id="fullScreenBtn" class="w-full py-2.5 border border-amber-700 text-amber-700 rounded-full font-bold text-sm active:bg-amber-50">
                            全屏临摹
                        </button>
                        <button class="w-full py-2.5 bg-amber-700 text-white rounded-full font-bold text-sm shadow-md active:bg-amber-800">
                            加入收藏
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app_v9.js?v=20260210_v9"></script>
</body>
</html>
