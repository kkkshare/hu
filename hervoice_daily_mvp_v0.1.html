<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HerVoice Daily · MVP v0.1</title>
  <style>
    @font-face {
      font-family: "HerVoiceCNYan";
      src: url("./assets/fonts/hervoice/fz_yanzhenqing_jf.ttf?v=20260217") format("truetype");
      font-display: swap;
    }

    @font-face {
      font-family: "HerVoiceCNZhao";
      src: url("./assets/fonts/hervoice/zhaomengfu_kaishu.ttf?v=20260217") format("truetype");
      font-display: swap;
    }

    @font-face {
      font-family: "HerVoiceCNBaiqing";
      src: url("./assets/fonts/hervoice/hy_baiqing_jian.ttf?v=20260217") format("truetype");
      font-display: swap;
    }

    @font-face {
      font-family: "HerVoiceCNWenzhengming";
      src: url("./assets/fonts/hervoice/hy_wenzhengming.ttf?v=20260217") format("truetype");
      font-display: swap;
    }

    :root {
      --ink: #2f2a24;
      --ink-soft: #5e5449;
      --muted: #847869;
      --line: rgba(97, 83, 67, 0.24);
      --paper: #ebe2d6;
      --paper-deep: #dbcfbf;
      --wash: #d6cab8;
      --soil: #796753;
      --moss: #918776;
      --card-shadow: 0 26px 48px rgba(78, 67, 53, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Iowan Old Style", "Palatino Linotype", "Songti SC", "Noto Serif SC", serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 14% 12%, rgba(130, 114, 92, 0.1), transparent 28%),
        radial-gradient(circle at 82% 18%, rgba(173, 159, 140, 0.16), transparent 34%),
        radial-gradient(circle at 76% 84%, rgba(137, 120, 100, 0.08), transparent 28%),
        linear-gradient(180deg, #f4efe7 0%, #eee7dc 42%, #e4dbcf 100%);
      min-height: 100vh;
      padding: 36px 16px 72px;
      position: relative;
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      pointer-events: none;
      z-index: 0;
      opacity: 0.6;
    }

    body::before {
      inset: 0;
      background-image:
        repeating-linear-gradient(
          115deg,
          rgba(92, 76, 57, 0.018) 0,
          rgba(92, 76, 57, 0.018) 2px,
          transparent 2px,
          transparent 17px
        ),
        repeating-linear-gradient(
          12deg,
          rgba(255, 255, 255, 0.16) 0,
          rgba(255, 255, 255, 0.16) 1px,
          transparent 1px,
          transparent 26px
        );
    }

    body::after {
      width: 360px;
      height: 360px;
      right: -110px;
      top: 52px;
      border-radius: 46% 54% 61% 39% / 42% 48% 52% 58%;
      background: radial-gradient(circle at 35% 35%, rgba(255, 255, 255, 0.42), rgba(181, 163, 141, 0.12) 58%, transparent 70%);
      filter: blur(3px);
      transform: rotate(-10deg);
    }

    .shell {
      position: relative;
      z-index: 1;
      max-width: 640px;
      margin: 0 auto;
      padding-top: 8px;
    }

    .shell::before,
    .shell::after {
      content: "";
      position: absolute;
      pointer-events: none;
      border-radius: 999px;
      background: rgba(123, 105, 85, 0.12);
      filter: blur(0.2px);
    }

    .shell::before {
      width: 72px;
      height: 10px;
      left: -18px;
      top: 22px;
      transform: rotate(-12deg);
    }

    .shell::after {
      width: 12px;
      height: 12px;
      right: 56px;
      top: 92px;
      box-shadow: 20px -16px 0 rgba(123, 105, 85, 0.1), -22px 30px 0 rgba(123, 105, 85, 0.08);
    }

    .masthead {
      position: relative;
      max-width: 520px;
      margin: 0 0 34px;
      padding: 0 12px 0 2px;
    }

    .eyebrow {
      margin: 0;
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .title {
      margin: 18px 0 14px;
      font-size: 33px;
      line-height: 1.08;
      letter-spacing: 0.07em;
      font-weight: 500;
      font-family: "Didot", "Bodoni 72 Oldstyle", "Hoefler Text", serif;
      text-transform: uppercase;
      max-width: 340px;
    }

    .sub {
      margin: 0;
      max-width: 430px;
      color: var(--ink-soft);
      font-size: 13px;
      line-height: 1.9;
      padding-left: 18px;
      border-left: 1px solid rgba(112, 97, 79, 0.36);
    }

    .doodles {
      position: absolute;
      right: 2px;
      top: 2px;
      width: 124px;
      height: 90px;
      pointer-events: none;
      opacity: 0.85;
    }

    .doodle-circle,
    .doodle-stroke,
    .doodle-dot {
      position: absolute;
      border: 1px solid rgba(105, 88, 70, 0.28);
    }

    .doodle-circle {
      width: 58px;
      height: 58px;
      right: 10px;
      top: 8px;
      border-radius: 58% 42% 51% 49% / 44% 59% 41% 56%;
      background: rgba(255, 255, 255, 0.08);
      transform: rotate(11deg);
    }

    .doodle-stroke {
      width: 54px;
      height: 16px;
      left: 10px;
      bottom: 18px;
      border-radius: 999px;
      background: rgba(118, 97, 73, 0.08);
      transform: rotate(-18deg);
    }

    .doodle-dot {
      width: 11px;
      height: 11px;
      right: 2px;
      bottom: 16px;
      border-radius: 50%;
      background: rgba(121, 103, 83, 0.13);
    }

    .card {
      position: relative;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.26), rgba(255, 255, 255, 0.05)),
        var(--card-tint, var(--paper));
      border: 1px solid var(--line);
      border-radius: 30px 36px 28px 40px;
      padding: 30px 26px 28px;
      box-shadow: var(--card-shadow);
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 0;
      opacity: 0.52;
      pointer-events: none;
      background:
        radial-gradient(circle at 16% 18%, rgba(255, 255, 255, 0.32), transparent 22%),
        radial-gradient(circle at 88% 22%, rgba(126, 106, 84, 0.08), transparent 24%),
        radial-gradient(circle at 28% 88%, rgba(126, 106, 84, 0.07), transparent 26%);
    }

    .card::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 0;
      opacity: 0.18;
      pointer-events: none;
      background-image:
        linear-gradient(128deg, rgba(255, 255, 255, 0.22), transparent 54%),
        repeating-linear-gradient(
          0deg,
          rgba(66, 54, 41, 0.05),
          rgba(66, 54, 41, 0.05) 1px,
          transparent 1px,
          transparent 4px
        );
    }

    .card.calligraphy::before {
      background:
        linear-gradient(rgba(241, 232, 219, 0.76), rgba(234, 225, 212, 0.68)),
        url("./calligraphy/assets/shufa_v8/da_large.jpg") center/cover no-repeat;
      opacity: 0.7;
    }

    .card > * { position: relative; z-index: 1; }

    .date-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      align-items: start;
      margin-bottom: 26px;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    .date-row > :first-child {
      max-width: 300px;
      line-height: 1.7;
    }

    .theme {
      justify-self: end;
      border: 1px solid rgba(109, 93, 75, 0.34);
      color: #665846;
      background: rgba(245, 239, 230, 0.8);
      padding: 6px 13px;
      border-radius: 19px 23px 17px 21px;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transform: translateY(6px) rotate(-3deg);
      box-shadow: 0 8px 16px rgba(105, 88, 70, 0.08);
    }

    .quote-cn {
      margin: 0;
      max-width: 92%;
      font-size: 29px;
      line-height: 1.82;
      letter-spacing: 0.05em;
      text-wrap: balance;
      font-family: "HerVoiceCNZhao", "Noto Serif SC", "Source Han Serif SC", "Songti SC", serif;
      font-weight: 500;
    }

    .quote-en {
      margin: 24px 0 0;
      max-width: 88%;
      padding-left: 22px;
      font-size: 18px;
      line-height: 1.95;
      color: #51483f;
      font-family: "Bodoni 72 Oldstyle", "Hoefler Text", "Baskerville", "Times New Roman", serif;
      letter-spacing: 0.01em;
      position: relative;
    }

    .quote-en::before {
      content: "";
      position: absolute;
      left: 0;
      top: 7px;
      width: 10px;
      height: calc(100% - 14px);
      border-left: 1px solid rgba(109, 93, 75, 0.32);
      border-radius: 999px;
      opacity: 0.9;
    }

    .author {
      margin: 24px 4px 2px auto;
      width: fit-content;
      max-width: 86%;
      text-align: right;
      color: #6a5f52;
      font-size: 13px;
      letter-spacing: 0.03em;
      line-height: 1.7;
      padding-top: 10px;
      border-top: 1px solid rgba(109, 93, 75, 0.24);
      transform: translateX(-4px);
    }

    .note {
      margin-top: 28px;
      padding-top: 18px;
      position: relative;
    }

    .note::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      width: 92px;
      height: 1px;
      background: rgba(109, 93, 75, 0.36);
    }

    .note-btn {
      width: 100%;
      border: 0;
      background: transparent;
      padding: 0 2px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #564b40;
      font-size: 14px;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .note-body {
      display: none;
      margin-top: 14px;
      font-size: 14px;
      color: #4f453a;
      line-height: 1.9;
      background: rgba(250, 245, 237, 0.52);
      border: 1px solid rgba(118, 99, 80, 0.16);
      border-radius: 16px 22px 18px 14px;
      padding: 14px 15px;
    }

    .note-body.show { display: block; }

    .controls {
      margin-top: 22px;
      display: grid;
      grid-template-columns: 1.08fr 0.92fr;
      gap: 14px;
      align-items: start;
    }

    .controls .action:nth-child(2),
    .controls .action:nth-child(4) {
      transform: translateY(10px);
    }

    .calendar {
      margin-top: 28px;
      padding-left: 24px;
      position: relative;
    }

    .calendar::before {
      content: "";
      position: absolute;
      left: 0;
      top: 8px;
      width: 1px;
      height: 58px;
      background: linear-gradient(rgba(109, 93, 75, 0.42), rgba(109, 93, 75, 0));
    }

    .calendar-label {
      margin: 0 0 12px;
      color: #675b4d;
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .history-select {
      width: 100%;
      min-height: 50px;
      padding: 0 18px;
      border: 1px solid var(--line);
      border-radius: 18px 22px 17px 23px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.24), rgba(255, 255, 255, 0.08)),
        rgba(242, 234, 224, 0.96);
      color: #43392f;
      font-family: inherit;
      font-size: 14px;
      letter-spacing: 0.03em;
      box-shadow: 0 10px 20px rgba(85, 71, 55, 0.06), inset 0 1px 0 rgba(255, 255, 255, 0.28);
      appearance: none;
      -webkit-appearance: none;
      cursor: pointer;
    }

    .calendar-shell {
      position: relative;
      max-width: 320px;
    }

    .calendar-shell::after {
      content: "⌄";
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 18px;
      pointer-events: none;
    }

    button.action,
    .template-chip {
      border: 1px solid var(--line);
      color: #43392f;
      font-family: inherit;
      cursor: pointer;
      transition: transform 0.24s ease, border-color 0.24s ease, background 0.24s ease, box-shadow 0.24s ease;
      box-shadow: 0 10px 20px rgba(85, 71, 55, 0.06), inset 0 1px 0 rgba(255, 255, 255, 0.28);
    }

    button.action {
      min-height: 48px;
      padding: 0 16px;
      border-radius: 15px 19px 14px 18px;
      background: rgba(242, 234, 224, 0.9);
      letter-spacing: 0.04em;
    }

    button.action:hover,
    .template-chip:hover {
      transform: translateY(-1px) rotate(-0.4deg);
      border-color: rgba(120, 98, 74, 0.42);
    }

    button.action.primary {
      grid-column: span 2;
      background: linear-gradient(135deg, #5f5041, #776352);
      color: #f7f1e7;
      border-color: rgba(95, 80, 65, 0.8);
      box-shadow: 0 16px 28px rgba(70, 58, 44, 0.18);
    }

    .poster-wrap {
      margin-top: 34px;
      display: none;
      padding-top: 8px;
    }

    .poster-wrap.show { display: block; }

    .poster-wrap img {
      width: 100%;
      border-radius: 24px 18px 26px 20px;
      border: 1px solid var(--line);
      box-shadow: 0 18px 34px rgba(65, 53, 39, 0.12);
      background: rgba(255, 255, 255, 0.28);
    }

    .hint {
      margin-top: 10px;
      padding-left: 14px;
      font-size: 12px;
      color: var(--muted);
      position: relative;
    }

    .hint::before {
      content: "";
      position: absolute;
      left: 0;
      top: 8px;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(121, 103, 83, 0.5);
    }

    .template-wrap {
      position: relative;
      margin-top: 30px;
      padding-left: 24px;
    }

    .template-wrap::before {
      content: "";
      position: absolute;
      left: 0;
      top: 6px;
      width: 1px;
      height: 54px;
      background: linear-gradient(rgba(109, 93, 75, 0.42), rgba(109, 93, 75, 0));
    }

    .template-title {
      margin: 0 0 12px;
      color: #675b4d;
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .template-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .template-chip {
      min-height: 40px;
      padding: 0 12px;
      border-radius: 18px 21px 17px 22px;
      background: rgba(245, 238, 229, 0.92);
      font-size: 12px;
      letter-spacing: 0.04em;
    }

    .template-chip:nth-child(2) {
      transform: translateY(7px);
    }

    .template-chip.active {
      border-color: rgba(103, 84, 61, 0.48);
      background: linear-gradient(135deg, #d9cab8, #ccb8a1);
      color: #554736;
      font-weight: 700;
    }

    @media (max-width: 560px) {
      body { padding: 26px 14px 56px; }
      .shell { max-width: 100%; }
      .masthead { margin-bottom: 28px; padding-right: 0; }
      .title { max-width: 280px; font-size: 28px; }
      .sub { max-width: 100%; font-size: 12px; line-height: 1.8; }
      .doodles { right: -6px; top: -4px; transform: scale(0.84); }
      .card { padding: 24px 20px 24px; border-radius: 26px 30px 24px 32px; }
      .date-row { grid-template-columns: 1fr; gap: 10px; }
      .theme { justify-self: start; transform: rotate(-2deg); }
      .quote-cn { max-width: 100%; font-size: 25px; line-height: 1.74; }
      .quote-en { max-width: 100%; padding-left: 18px; font-size: 16px; line-height: 1.85; }
      .author { max-width: 100%; }
      .controls { grid-template-columns: 1fr; }
      .controls .action:nth-child(2),
      .controls .action:nth-child(4) { transform: none; }
      button.action.primary { grid-column: span 1; }
      .calendar { padding-left: 18px; }
      .template-wrap { padding-left: 18px; }
      .template-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .template-chip:nth-child(2) { transform: translateY(4px); }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="masthead">
      <p class="eyebrow">imperfect beauty / becoming slowly</p>
      <div class="doodles" aria-hidden="true">
        <span class="doodle-circle"></span>
        <span class="doodle-stroke"></span>
        <span class="doodle-dot"></span>
      </div>
      <h1 class="title">HerVoice Daily</h1>
      <p class="sub">一页一语，慢慢展开。中英对照、静读批注、周日手写。</p>
    </header>

    <article id="dailyCard" class="card">
      <div class="date-row">
        <div id="dateText"></div>
        <div id="themeText" class="theme"></div>
      </div>

      <p id="quoteCn" class="quote-cn"></p>
      <p id="quoteEn" class="quote-en"></p>
      <p id="author" class="author"></p>

      <section class="note">
        <button id="noteToggle" class="note-btn" type="button">
          <span>Quiet Note</span>
          <span id="noteArrow">展开</span>
        </button>
        <div id="noteBody" class="note-body"></div>
      </section>
    </article>

    <section class="controls">
      <button class="action" id="prevDay" type="button">前一页</button>
      <button class="action" id="nextDay" type="button">后一页</button>
      <button class="action primary" id="makePoster" type="button">生成留白海报</button>
      <button class="action" id="downloadPoster" type="button">下载这一页</button>
    </section>

    <section class="template-wrap">
      <p class="template-title">海报纸感</p>
      <div id="posterTemplates" class="template-grid"></div>
    </section>

    <section class="calendar">
      <p class="calendar-label">翻看日期</p>
      <div class="calendar-shell">
        <select id="historyCalendar" class="history-select" aria-label="选择 HerVoice 日期"></select>
      </div>
    </section>

    <section id="posterWrap" class="poster-wrap">
      <img id="posterImage" alt="HerVoice 日签海报" />
      <p class="hint">这一页已经落下，轻点即可保存。</p>
    </section>
  </div>

  <script>
    const dataUrl = "./data/hervoice_quotes_2026.json";
    const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=160x160&data=${encodeURIComponent(location.href)}`;

    let entries = [];
    let index = 0;
    let noteOpen = false;
    const posterTemplates = [
      { id: "earth", name: "晨纸", bg: "#efe6d8", paper: "#f6efe3", title: "#2f2720", cn: "#2c241d", en: "#54473c", accent: "#8b7763", line: "#bba78f", qrStroke: "#9b866f", noteFill: "rgba(252,248,241,0.58)", noteStroke: "rgba(126,105,82,0.22)", texture: "warm" },
      { id: "char", name: "炭墨", bg: "#ddd1c2", paper: "#e9ded0", title: "#312922", cn: "#28211a", en: "#504539", accent: "#7f6b57", line: "#aa947d", qrStroke: "#8f7a64", noteFill: "rgba(247,242,236,0.48)", noteStroke: "rgba(116,96,74,0.22)", texture: "charcoal" },
      { id: "stone", name: "雾石", bg: "#e3dcd1", paper: "#eee7dc", title: "#302a24", cn: "#2d2721", en: "#5c5246", accent: "#867a6c", line: "#b3a493", qrStroke: "#988978", noteFill: "rgba(255,252,248,0.42)", noteStroke: "rgba(120,106,88,0.2)", texture: "mist" }
    ];
    let activeTemplate = posterTemplates[0];

    const embeddedEntries = [
      {
            "date": "2026-03-15",
            "week_day": "Sunday",
            "theme": "Independence",
            "quote": {
                  "content_cn": "女性若想写作，就必须有钱，还要有一间自己的房间。",
                  "content_en": "A woman must have money and a room of her own if she is to write fiction.",
                  "author": "Virginia Woolf",
                  "source": "A Room of One's Own"
            },
            "teacher_note": {
                  "keyword": "be to do",
                  "explanation": "【名师点拨】注意从句中的 'if she is to write'。这里的 'be + to do' 结构并不是将来时，而是表示“意图”或“目的”。它比单纯的 'wants to' 更正式、更有力度，暗示了写作是一种需要严肃对待的志业，而非随意的消遣。"
            },
            "visual_type": "standard",
            "background_color": "#F2EBE5",
            "tags": [
                  "西方文本",
                  "觉醒",
                  "原句摘录"
            ]
      },
      {
            "date": "2026-03-16",
            "week_day": "Monday",
            "theme": "Becoming",
            "quote": {
                  "content_cn": "女人不是天生的，而是后来形成的。",
                  "content_en": "One is not born, but rather becomes, a woman.",
                  "author": "Simone de Beauvoir",
                  "source": "The Second Sex"
            },
            "teacher_note": {
                  "keyword": "rather",
                  "explanation": "【名师点拨】'not A, but rather B' 用于强调“不是A，而更准确是B”。在学术写作里比单纯 but 更严谨。"
            },
            "visual_type": "standard",
            "background_color": "#EDE9E4",
            "tags": [
                  "西方文本",
                  "存在主义",
                  "原句摘录"
            ]
      },
      {
            "date": "2026-03-17",
            "week_day": "Tuesday",
            "theme": "Voice",
            "quote": {
                  "content_cn": "你的沉默不会保护你。",
                  "content_en": "Your silence will not protect you.",
                  "author": "Audre Lorde",
                  "source": "The Transformation of Silence into Language and Action"
            },
            "teacher_note": {
                  "keyword": "will not",
                  "explanation": "【名师点拨】'will not' 在这里不是未来时预测，而是强烈判断：沉默这条路行不通。"
            },
            "visual_type": "standard",

    const refs = {
      card: document.getElementById("dailyCard"),
      dateText: document.getElementById("dateText"),
      themeText: document.getElementById("themeText"),
      quoteCn: document.getElementById("quoteCn"),
      quoteEn: document.getElementById("quoteEn"),
      author: document.getElementById("author"),
      noteToggle: document.getElementById("noteToggle"),
      noteArrow: document.getElementById("noteArrow"),
      noteBody: document.getElementById("noteBody"),
      posterTemplates: document.getElementById("posterTemplates"),
      historyCalendar: document.getElementById("historyCalendar"),
      posterWrap: document.getElementById("posterWrap"),
      posterImage: document.getElementById("posterImage"),
      makePoster: document.getElementById("makePoster"),
      downloadPoster: document.getElementById("downloadPoster"),
      prevDay: document.getElementById("prevDay"),
      nextDay: document.getElementById("nextDay")

    function toCnDay(day) {
      const names = [
        "", "初一", "初二", "初三", "初四", "初五", "初六", "初七", "初八", "初九", "初十",
        "十一", "十二", "十三", "十四", "十五", "十六", "十七", "十八", "十九", "二十",
        "廿一", "廿二", "廿三", "廿四", "廿五", "廿六", "廿七", "廿八", "廿九", "三十"
      ];
      return names[day] || `${day}日`;
    }

    function getLunarText(dateStr) {
      try {
        const fmt = new Intl.DateTimeFormat("zh-CN-u-ca-chinese", {
          month: "long",
          day: "numeric"
        });
        const raw = fmt.format(new Date(dateStr));
        const m = raw.match(/^(闰?[^\d]+)(\d{1,2})日?$/);
        if (m) {
          return `${m[1]}${toCnDay(Number(m[2]))}`;
        }
        return raw;
      } catch (err) {
        return "农历待接入";
      }
    }

    function formatDate(entry) {
      const dateStr = entry.date;
      const d = new Date(dateStr);
      const week = "日一二三四五六"[d.getDay()];
      const weekLabel = entry.week_day ? `${entry.week_day} / 周${week}` : `周${week}`;
      return `${dateStr} · ${weekLabel} · ${getLunarText(dateStr)}`;
    }

    function renderCalendar() {
      refs.historyCalendar.innerHTML = "";
      entries.forEach((item, i) => {
        const option = document.createElement("option");
        option.value = String(i);
        option.textContent = `${item.date} · ${item.theme}`;
        option.selected = i === index;
        refs.historyCalendar.appendChild(option);
      });
    }

    function renderTemplatePicker() {
      refs.posterTemplates.innerHTML = "";
      posterTemplates.forEach((tpl) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = `template-chip ${activeTemplate.id === tpl.id ? "active" : ""}`;
        btn.textContent = tpl.name;
        btn.addEventListener("click", () => {
          activeTemplate = tpl;
          renderTemplatePicker();
        });
        refs.posterTemplates.appendChild(btn);
      });
    }

    function render() {
      const today = entries[index];
      refs.card.style.setProperty("--card-tint", today.background_color || "#f2efe8");
      refs.card.classList.toggle("calligraphy", today.visual_type === "calligraphy");

      refs.dateText.textContent = formatDate(today);
      refs.themeText.textContent = today.theme;
      refs.quoteCn.textContent = today.quote.content_cn;
      refs.quoteEn.textContent = today.quote.content_en;
      refs.author.textContent = `— ${today.quote.author} · ${today.quote.source}`;

      noteOpen = false;
      refs.noteArrow.textContent = "展开";
      refs.noteBody.classList.remove("show");
      refs.noteBody.innerHTML = `<strong>关键词：</strong>${today.teacher_note.keyword}<br>${today.teacher_note.explanation}`;

      renderCalendar();
      renderTemplatePicker();
    }

    refs.noteToggle.addEventListener("click", () => {
      noteOpen = !noteOpen;
      refs.noteArrow.textContent = noteOpen ? "收起" : "展开";
      refs.noteBody.classList.toggle("show", noteOpen);
    });

    refs.historyCalendar.addEventListener("change", (event) => {
      index = Number(event.target.value) || 0;
      render();
    });

    refs.prevDay.addEventListener("click", () => {
      index = (index - 1 + entries.length) % entries.length;
      render();
    });

    refs.nextDay.addEventListener("click", () => {
      index = (index + 1) % entries.length;
      render();
    });

    function getWrappedLines(ctx, rawText, maxWidth, wrapMode = "char") {
      const text = String(rawText || "").trim();
      if (!text) return [];
      const lines = [];

      if (wrapMode === "word") {
        const words = text.split(/\s+/);
        let line = "";
        for (let i = 0; i < words.length; i++) {
          const next = words[i];
          const testLine = line ? `${line} ${next}` : next;
          if (ctx.measureText(testLine).width <= maxWidth) {
            line = testLine;
            continue;
          }
          if (line) lines.push(line);
          if (ctx.measureText(next).width <= maxWidth) {
            line = next;
          } else {
            let chunk = "";
            for (const ch of next) {
              const testChunk = chunk + ch;
              if (ctx.measureText(testChunk).width > maxWidth && chunk) {
                lines.push(chunk);
                chunk = ch;
              } else {
                chunk = testChunk;
              }
            }
            line = chunk;
          }
        }
        if (line) lines.push(line);
        return lines;
      }

      let line = "";
      for (const ch of text) {
        const testLine = line + ch;
        if (ctx.measureText(testLine).width > maxWidth && line) {
          lines.push(line);
          line = ch;
        } else {
          line = testLine;
        }
      }
      if (line) lines.push(line);
      return lines;
    }

    function drawLines(ctx, lines, x, y, lineHeight) {
      if (!lines.length) return y;
      lines.forEach((line, idx) => {
        ctx.fillText(line, x, y + idx * lineHeight);
      });
      return y + (lines.length - 1) * lineHeight;
    }

    function drawRoundedRect(ctx, x, y, width, height, radius) {
      const r = typeof radius === "number"
        ? { tl: radius, tr: radius, br: radius, bl: radius }
        : {
            tl: radius.tl || 0,
            tr: radius.tr || 0,
            br: radius.br || 0,
            bl: radius.bl || 0
          };
      ctx.beginPath();
      ctx.moveTo(x + r.tl, y);
      ctx.lineTo(x + width - r.tr, y);
      ctx.quadraticCurveTo(x + width, y, x + width, y + r.tr);
      ctx.lineTo(x + width, y + height - r.br);
      ctx.quadraticCurveTo(x + width, y + height, x + width - r.br, y + height);
      ctx.lineTo(x + r.bl, y + height);
      ctx.quadraticCurveTo(x, y + height, x, y + height - r.bl);
      ctx.lineTo(x, y + r.tl);
      ctx.quadraticCurveTo(x, y, x + r.tl, y);
      ctx.closePath();
    }

    function fillRoundedRect(ctx, x, y, width, height, radius) {
      drawRoundedRect(ctx, x, y, width, height, radius);
      ctx.fill();
    }

    function strokeRoundedRect(ctx, x, y, width, height, radius) {
      drawRoundedRect(ctx, x, y, width, height, radius);
      ctx.stroke();
    }

    function drawAlignedLines(ctx, lines, x, y, lineHeight, align = "left") {
      if (!lines.length) return y;
      const previousAlign = ctx.textAlign;
      ctx.textAlign = align;
      lines.forEach((line, idx) => {
        ctx.fillText(line, x, y + idx * lineHeight);
      });
      ctx.textAlign = previousAlign;
      return y + (lines.length - 1) * lineHeight;
    }

    function drawBrushMark(ctx, x, y, width, height, color, rotate = 0) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(rotate);
      ctx.fillStyle = color;
      fillRoundedRect(ctx, -width / 2, -height / 2, width, height, { tl: height / 2, tr: height * 0.3, br: height / 2, bl: height * 0.4 });
      ctx.restore();
    }

    function drawPosterTexture(ctx, canvas, tpl) {
      const glow = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
      glow.addColorStop(0, tpl.paper);
      glow.addColorStop(0.45, "rgba(255,255,255,0.12)");
      glow.addColorStop(1, tpl.bg);
      ctx.fillStyle = glow;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.save();
      ctx.globalAlpha = 0.14;
      ctx.strokeStyle = tpl.line;
      for (let i = 0; i < 28; i++) {
        const y = 84 + i * 46;
        const offset = (i % 3) * 24;
        ctx.lineWidth = i % 5 === 0 ? 1.4 : 0.8;
        ctx.beginPath();
        ctx.moveTo(54 + offset, y);
        ctx.lineTo(canvas.width - 70 - offset * 0.6, y + ((i % 4) - 1.5) * 2);
        ctx.stroke();
      }
      ctx.restore();

      ctx.save();
      ctx.globalAlpha = 0.1;
      for (let i = 0; i < 90; i++) {
        const x = 58 + (i * 107) % (canvas.width - 120);
        const y = 42 + (i * 173) % (canvas.height - 84);
        const size = 1 + (i % 3);
        ctx.fillStyle = i % 2 === 0 ? tpl.line : "rgba(255,255,255,0.45)";
        ctx.fillRect(x, y, size, size);
      }
      ctx.restore();

      drawBrushMark(ctx, 886, 128, 174, 26, "rgba(126, 105, 82, 0.14)", -0.12);
      drawBrushMark(ctx, 188, 1180, 146, 18, "rgba(126, 105, 82, 0.1)", 0.08);
    }

    async function generatePoster() {
      const today = entries[index];
      const tpl = activeTemplate;
      const canvas = document.createElement("canvas");
      canvas.width = 1080;
      canvas.height = 1440;
      const ctx = canvas.getContext("2d");

      ctx.fillStyle = tpl.bg;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      drawPosterTexture(ctx, canvas, tpl);

      if (today.visual_type === "calligraphy") {
        const bg = new Image();
        bg.src = "./calligraphy/assets/shufa_v8/da_large.jpg";
        await bg.decode().catch(() => {});
        if (bg.naturalWidth) {
          ctx.save();
          ctx.globalAlpha = 0.14;
          ctx.drawImage(bg, 0, 0, canvas.width, canvas.height);
          ctx.restore();
        }
      }

      ctx.fillStyle = tpl.accent;
      ctx.font = "22px 'Bodoni 72 Oldstyle', 'Times New Roman', serif";
      ctx.fillText("quiet lines for becoming", 110, 110);

      ctx.fillStyle = tpl.title;
      ctx.font = "58px 'Bodoni 72 Oldstyle', 'Hoefler Text', serif";
      ctx.fillText("HerVoice Daily", 110, 168);

      ctx.strokeStyle = tpl.line;
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.moveTo(110, 198);
      ctx.lineTo(314, 198);
      ctx.stroke();

      ctx.fillStyle = tpl.accent;
      ctx.font = "30px 'Noto Serif SC', serif";
      ctx.fillText(formatDate(today), 110, 240);

      ctx.fillStyle = tpl.en;
      ctx.font = "25px 'Noto Serif SC', serif";
      ctx.fillText(`Theme · ${today.theme || 'Daily'}`, 110, 284);

      ctx.save();
      ctx.translate(128, 410);
      ctx.rotate(-0.04);
      ctx.fillStyle = tpl.line;
      fillRoundedRect(ctx, -4, -112, 8, 224, { tl: 8, tr: 5, br: 10, bl: 7 });
      ctx.restore();

      ctx.fillStyle = tpl.cn;
      ctx.font = today.visual_type === "calligraphy"
        ? "60px 'HerVoiceCNZhao', 'Noto Serif SC', serif"
        : "56px 'HerVoiceCNZhao', 'Noto Serif SC', serif";
      const cnLines = getWrappedLines(ctx, today.quote.content_cn, 760, "char");
      let y = drawLines(ctx, cnLines, 172, 360, today.visual_type === "calligraphy" ? 90 : 84);

      ctx.fillStyle = tpl.en;
      ctx.font = "40px 'Baskerville', 'Times New Roman', serif";
      const enLines = getWrappedLines(ctx, today.quote.content_en, 650, "word");
      y = drawLines(ctx, enLines, 232, y + 110, 58);

      ctx.fillStyle = tpl.accent;
      ctx.font = "28px 'Noto Serif SC', serif";
      const authorLines = getWrappedLines(ctx, `— ${today.quote.author} · ${today.quote.source}`, 520, "char");
      const authorY = y + 96;
      drawAlignedLines(ctx, authorLines, 870, authorY, 42, "right");

      ctx.strokeStyle = tpl.line;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(172, authorY + 28);
      ctx.lineTo(876, authorY + 28);
      ctx.stroke();

      const noteTop = authorY + 68;
      const noteWidth = 860;
      const noteX = 110;
      const noteTitleY = noteTop + 46;
      const noteTextY = noteTitleY + 44;
      ctx.font = "26px 'Noto Serif SC', serif";
      const noteLines = getWrappedLines(ctx, today.teacher_note.explanation, 760, "char");
      const noteHeight = Math.max(140, noteLines.length * 40 + 78);
      ctx.fillStyle = tpl.noteFill;
      fillRoundedRect(ctx, noteX, noteTop, noteWidth, noteHeight, { tl: 28, tr: 22, br: 30, bl: 18 });
      ctx.strokeStyle = tpl.noteStroke;
      ctx.lineWidth = 1.1;
      strokeRoundedRect(ctx, noteX, noteTop, noteWidth, noteHeight, { tl: 28, tr: 22, br: 30, bl: 18 });

      ctx.fillStyle = tpl.accent;
      ctx.font = "28px 'Noto Serif SC', serif";
      ctx.fillText(`Quiet Note · ${today.teacher_note.keyword}`, noteX + 28, noteTitleY);
      ctx.fillStyle = tpl.en;
      ctx.font = "26px 'Noto Serif SC', serif";
      const noteEndY = drawLines(ctx, noteLines, noteX + 28, noteTextY, 40);

      const footerTop = Math.max(noteTop + noteHeight + 76, 1120);
      ctx.strokeStyle = tpl.line;
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.moveTo(110, footerTop - 24);
      ctx.lineTo(970, footerTop - 24);
      ctx.stroke();

      if (Array.isArray(today.tags) && today.tags.length) {
        const tagLines = getWrappedLines(ctx, today.tags.join(' · '), 560, 'char');
        ctx.fillStyle = tpl.accent;
        ctx.font = "26px 'Noto Serif SC', serif";
        drawLines(ctx, tagLines, 110, footerTop + 12, 38);
      }

      ctx.fillStyle = tpl.en;
      ctx.font = "24px 'Noto Serif SC', serif";
      ctx.fillText("one page, one quiet becoming", 110, footerTop + 96);
      ctx.fillText("hervoice daily", 110, footerTop + 134);

      ctx.fillStyle = "rgba(255,255,255,0.32)";
      fillRoundedRect(ctx, 772, footerTop - 8, 198, 198, { tl: 34, tr: 24, br: 30, bl: 20 });
      ctx.strokeStyle = tpl.noteStroke;
      ctx.lineWidth = 1;
      strokeRoundedRect(ctx, 772, footerTop - 8, 198, 198, { tl: 34, tr: 24, br: 30, bl: 20 });

      const qr = new Image();
      qr.crossOrigin = "anonymous";
      qr.src = qrUrl;
      await qr.decode().catch(() => {});
      if (qr.naturalWidth) {
        ctx.drawImage(qr, 788, footerTop + 8, 166, 166);
      } else {
        ctx.strokeStyle = tpl.qrStroke;
        ctx.strokeRect(788, footerTop + 8, 166, 166);
        ctx.fillStyle = tpl.qrStroke;
        ctx.font = "24px serif";
        ctx.fillText("SCAN", 842, footerTop + 98);
      }

      const url = canvas.toDataURL("image/png");
      refs.posterImage.src = url;
      refs.posterWrap.classList.add("show");
      refs.downloadPoster.dataset.url = url;
    }

    refs.makePoster.addEventListener("click", generatePoster);
    refs.downloadPoster.addEventListener("click", () => {
      const url = refs.downloadPoster.dataset.url;
      if (!url) {
        alert("先让这一页落成海报吧");
        return;
      }
      const a = document.createElement("a");
      a.href = url;
      a.download = `hervoice-${entries[index].date}.png`;
      a.click();
    });

    function applyEntries(list) {
      entries = Array.isArray(list) && list.length ? list : embeddedEntries;
      const todayStr = new Date().toISOString().slice(0, 10);
      const todayHit = entries.findIndex((item) => item.date === todayStr);
      index = todayHit >= 0 ? todayHit : 0;
      render();
    }

    fetch(dataUrl)
      .then((res) => res.json())
      .then((data) => applyEntries(data))
      .catch(() => applyEntries(embeddedEntries));
  </script>
