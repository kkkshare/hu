    @font-face {
      font-family: "HerVoiceCNYan";

    }

    @font-face {
      font-family: "HerVoiceCNZhao";

      font-display: swap;
    }

    @font-face {
      font-family: "HerVoiceCNBaiqing";

      font-display: swap;
    }

    @font-face {
      font-family: "HerVoiceCNWenzhengming";
      src: url("./assets/fonts/hervoice/hy_wenzhengming.ttf?v=20260217") format("truetype");
      font-display: swap;
    }

    :root {
      --ink: #1f252b;
      --muted: #66717a;
      --line: rgba(58, 69, 78, 0.2);
      --paper: #edf1f4;
      --gold: #7c8794;
      --rose: #7d8892;
      --card-shadow: 0 18px 40px rgba(24, 35, 46, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Iowan Old Style", "Palatino Linotype", "Songti SC", "Noto Serif SC", serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 8% 6%, rgba(126, 141, 154, 0.22), transparent 34%),
        radial-gradient(circle at 86% 100%, rgba(133, 148, 161, 0.12), transparent 40%),
        linear-gradient(160deg, #f1f4f6 0%, #e7ecf0 100%);
      min-height: 100vh;
      padding: 28px 14px 56px;
    }

    .shell { max-width: 560px; margin: 0 auto; }

    .title {
      margin: 0 0 10px;
      font-size: 28px;
      letter-spacing: 0.06em;
      font-family: "Didot", "Bodoni 72 Oldstyle", "Bodoni 72", "Hoefler Text", serif;
      text-transform: uppercase;
    }

    .sub {
      margin: 0 0 20px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
      padding-left: 10px;
      border-left: 2px solid rgba(114, 128, 140, 0.56);
    }

    .card {
      position: relative;
      background: var(--card-tint, var(--paper));
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: 24px 22px;
      box-shadow: var(--card-shadow);
      overflow: hidden;
    }

    .card::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 0;
      opacity: 0.16;
      pointer-events: none;
      background-image:
        linear-gradient(120deg, rgba(255, 255, 255, 0.22), transparent 50%),
        repeating-linear-gradient(
          0deg,
          rgba(43, 37, 27, 0.04),
          rgba(43, 37, 27, 0.04) 1px,
          transparent 1px,
          transparent 3px
        );
    }

    .card.calligraphy::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(rgba(243, 236, 224, 0.9), rgba(239, 231, 216, 0.86)),
        url("./calligraphy/assets/shufa_v8/da_large.jpg") center/cover no-repeat;
      z-index: 0;
    }

    .card > * { position: relative; z-index: 1; }

    .date-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 22px;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.03em;
    }

    .theme {
      border: 1px solid rgba(108, 122, 136, 0.42);
      color: #50606f;
      background: rgba(246, 249, 251, 0.72);
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .quote-cn {
      margin: 0;
      font-size: 33px;
      line-height: 1.62;
      letter-spacing: 0.04em;
      text-wrap: balance;
      font-family: "HerVoiceCNZhao", "HerVoiceCNYan", "Songti SC", "Noto Serif SC", serif;
      font-weight: 500;
    }

    .quote-en {
      margin: 18px 0 0;
      font-size: 18px;
      line-height: 1.85;
      color: #36424d;
      font-family: "Bodoni 72 Oldstyle", "Hoefler Text", "Baskerville", "Times New Roman", serif;
      letter-spacing: 0.01em;
    }

    .author {
      margin: 18px 0 2px;
      text-align: right;
      color: #5d6a74;
      font-size: 13px;
      letter-spacing: 0.03em;
    }

    .note {
      margin-top: 18px;
      border-top: 1px dashed var(--line);
      padding-top: 14px;
    }

    .note-btn {
      width: 100%;
      border: 0;
      background: transparent;
      padding: 0;
      display: flex;
      justify-content: space-between;
      color: #4f4637;
      font-size: 14px;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: 0.02em;
    }

    .note-body {
      display: none;
      margin-top: 12px;
      font-size: 14px;
      color: #4b4233;
      line-height: 1.8;
      background: rgba(255, 252, 247, 0.56);
      border-radius: 14px;
      padding: 10px 12px;
    }

    .note-body.show { display: block; }

    .controls {
      margin-top: 16px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .calendar {
      margin-top: 16px;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    button.action {
      border-radius: 14px;
      border: 1px solid var(--line);
      min-height: 44px;
      background: rgba(251, 246, 238, 0.82);
      color: #3b3428;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 0.03em;
      transition: all 0.24s ease;
    }

    button.action:hover {
      transform: translateY(-1px);
      border-color: rgba(146, 111, 55, 0.4);
    }

    button.action.primary {
      background: linear-gradient(135deg, #2c251a, #473826);
      color: #fdf6ea;
      border-color: #5a472d;
      box-shadow: 0 10px 20px rgba(43, 32, 17, 0.2);
      grid-column: span 2;
    }

    .calendar button.active {
      border-color: #8f6b36;
      background: linear-gradient(145deg, #f4ead7, #efe1c7);
      color: #5c421b;
      font-weight: 700;
    }

    .poster-wrap {
      margin-top: 18px;
      display: none;
    }

    .poster-wrap.show { display: block; }

    .poster-wrap img {
      width: 100%;
      border-radius: 20px;
      border: 1px solid var(--line);
      box-shadow: 0 16px 28px rgba(36, 28, 16, 0.12);
    }

    .hint { margin-top: 8px; font-size: 12px; color: var(--muted); }

    .template-wrap {
      margin-top: 16px;
    }

    .template-title {
      margin: 0 0 10px;
      color: #5f5648;
      font-size: 12px;
      letter-spacing: 0.08em;
    }

    .template-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .template-chip {
      border-radius: 999px;
      border: 1px solid var(--line);
      min-height: 36px;
      background: rgba(251, 246, 238, 0.82);
      color: #3b3428;
      font-size: 12px;
      letter-spacing: 0.04em;
      cursor: pointer;
    }

    .template-chip.active {
      border-color: #8f6b36;
      background: linear-gradient(145deg, #f4ead7, #efe1c7);
      color: #5c421b;
      font-weight: 700;
    }

    @media (max-width: 560px) {
      .title { font-size: 25px; }
      .quote-cn { font-size: 29px; }
      .quote-en { font-size: 17px; }
      .calendar { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .template-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
  </style>
</head>

      const names = [
        "", "初一", "初二", "初三", "初四", "初五", "初六", "初七", "初八", "初九", "初十",
        "十一", "十二", "十三", "十四", "十五", "十六", "十七", "十八", "十九", "二十",
        "廿一", "廿二", "廿三", "廿四", "廿五", "廿六", "廿七", "廿八", "廿九", "三十"
      ];
      return names[day] || `${day}日`;
    }

    function getLunarText(dateStr) {
      try {
        const fmt = new Intl.DateTimeFormat("zh-CN-u-ca-chinese", {
          month: "long",
          day: "numeric"
        });
        const raw = fmt.format(new Date(dateStr));
        const m = raw.match(/^(闰?[^\d]+)(\d{1,2})日?$/);
        if (m) {
          return `${m[1]}${toCnDay(Number(m[2]))}`;
        }
        return raw;
      } catch (err) {
        return "农历待接入";
      }
    }

    function formatDate(entry) {
      const dateStr = entry.date;
      const d = new Date(dateStr);
      const week = "日一二三四五六"[d.getDay()];
      const weekLabel = entry.week_day ? `${entry.week_day} / 周${week}` : `周${week}`;
      return `${dateStr} · ${weekLabel} · ${getLunarText(dateStr)}`;
    }

    function renderCalendar() {
      refs.historyCalendar.innerHTML = "";
      entries.forEach((item, i) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = `action ${i === index ? "active" : ""}`;
        btn.textContent = item.date.slice(5);
        btn.addEventListener("click", () => {
          index = i;
          render();
        });
        refs.historyCalendar.appendChild(btn);
      });
    }

    function renderTemplatePicker() {
      refs.posterTemplates.innerHTML = "";
      posterTemplates.forEach((tpl) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = `template-chip ${activeTemplate.id === tpl.id ? "active" : ""}`;
        btn.textContent = tpl.name;
        btn.addEventListener("click", () => {
          activeTemplate = tpl;
          renderTemplatePicker();
        });
        refs.posterTemplates.appendChild(btn);
      });
    }

    function render() {
      const today = entries[index];
      refs.card.style.setProperty("--card-tint", today.background_color || "#f2efe8");
      refs.card.classList.toggle("calligraphy", today.visual_type === "calligraphy");

      refs.dateText.textContent = formatDate(today);
      refs.themeText.textContent = today.theme;
      refs.quoteCn.textContent = today.quote.content_cn;
      refs.quoteEn.textContent = today.quote.content_en;
      refs.author.textContent = `— ${today.quote.author} · ${today.quote.source}`;

      noteOpen = false;
      refs.noteArrow.textContent = "展开";
      refs.noteBody.classList.remove("show");
      refs.noteBody.innerHTML = `<strong>关键词：</strong>${today.teacher_note.keyword}<br>${today.teacher_note.explanation}`;

      renderCalendar();
      renderTemplatePicker();
    }

    refs.noteToggle.addEventListener("click", () => {
      noteOpen = !noteOpen;
      refs.noteArrow.textContent = noteOpen ? "收起" : "展开";
      refs.noteBody.classList.toggle("show", noteOpen);
    });

    refs.prevDay.addEventListener("click", () => {
      index = (index - 1 + entries.length) % entries.length;
      render();
    });

    refs.nextDay.addEventListener("click", () => {
      index = (index + 1) % entries.length;
      render();
    });

    function getWrappedLines(ctx, rawText, maxWidth, wrapMode = "char") {
      const text = String(rawText || "").trim();
      if (!text) return [];
      const lines = [];

      if (wrapMode === "word") {
        const words = text.split(/\s+/);
        let line = "";
        for (let i = 0; i < words.length; i++) {
          const next = words[i];
          const testLine = line ? `${line} ${next}` : next;
          if (ctx.measureText(testLine).width <= maxWidth) {
            line = testLine;
            continue;
          }
          if (line) lines.push(line);
          if (ctx.measureText(next).width <= maxWidth) {
            line = next;
          } else {
            let chunk = "";
            for (const ch of next) {
              const testChunk = chunk + ch;
              if (ctx.measureText(testChunk).width > maxWidth && chunk) {
                lines.push(chunk);
                chunk = ch;
              } else {
                chunk = testChunk;
              }
            }
            line = chunk;
          }
        }
        if (line) lines.push(line);
        return lines;
      }

      let line = "";
      for (const ch of text) {
        const testLine = line + ch;
        if (ctx.measureText(testLine).width > maxWidth && line) {
          lines.push(line);
          line = ch;
        } else {
          line = testLine;
        }
      }
      if (line) lines.push(line);
      return lines;
    }

    function drawLines(ctx, lines, x, y, lineHeight) {
      if (!lines.length) return y;
      lines.forEach((line, idx) => {
        ctx.fillText(line, x, y + idx * lineHeight);
      });
      return y + (lines.length - 1) * lineHeight;
    }

    async function generatePoster() {
      const today = entries[index];
      const tpl = activeTemplate;
      const canvas = document.createElement("canvas");
      canvas.width = 1080;
      canvas.height = 1440;
      const ctx = canvas.getContext("2d");

      ctx.fillStyle = tpl.bg;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      if (tpl.id === "paper") {
        ctx.fillStyle = "rgba(255,255,255,0.22)";
        ctx.fillRect(0, 0, canvas.width, 220);
      }

      if (tpl.id === "ink") {
        const grad = ctx.createLinearGradient(0, 0, 1080, 1440);
        grad.addColorStop(0, "rgba(255,255,255,0.06)");
        grad.addColorStop(1, "rgba(0,0,0,0.18)");
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }

      if (today.visual_type === "calligraphy") {
        const bg = new Image();
        bg.src = "./calligraphy/assets/shufa_v8/da_large.jpg";
        await bg.decode().catch(() => {});
        if (bg.naturalWidth) {
          ctx.globalAlpha = tpl.id === "ink" ? 0.18 : 0.24;
          ctx.drawImage(bg, 0, 0, canvas.width, canvas.height);
          ctx.globalAlpha = 1;
        }
      }

      ctx.fillStyle = tpl.title;
      ctx.font = "56px 'Noto Serif SC', serif";
      ctx.fillText("HerVoice Daily", 90, 120);

      ctx.fillStyle = tpl.accent;
      ctx.font = "34px 'Noto Serif SC', serif";
      ctx.fillText(formatDate(today), 90, 180);

      ctx.fillStyle = tpl.cn;
      ctx.font = "58px 'Noto Serif SC', serif";
      const cnLines = getWrappedLines(ctx, today.quote.content_cn, 900, "char");
      let y = drawLines(ctx, cnLines, 90, 304, 92);

      ctx.fillStyle = tpl.en;
      ctx.font = "44px 'Times New Roman', serif";
      const enLines = getWrappedLines(ctx, today.quote.content_en, 900, "word");
      y = drawLines(ctx, enLines, 90, y + 122, 64);

      ctx.fillStyle = tpl.accent;
      ctx.font = "32px 'Noto Serif SC', serif";
      const authorY = y + 106;
      ctx.fillText(`— ${today.quote.author} · ${today.quote.source}`, 90, authorY);

      ctx.strokeStyle = tpl.qrStroke;
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.moveTo(90, authorY + 34);
      ctx.lineTo(990, authorY + 34);
      ctx.stroke();

      const noteTitleY = authorY + 96;
      const noteTextY = noteTitleY + 54;
      ctx.font = "28px 'Noto Serif SC', serif";
      const noteLines = getWrappedLines(ctx, today.teacher_note.explanation, 860, "char");
      const noteEndY = drawLines(ctx, noteLines, 110, noteTextY, 46);

      const noteTop = noteTitleY - 34;
      const noteHeight = Math.max(noteEndY - noteTop + 32, 130);
      ctx.fillStyle = tpl.id === "ink" ? "rgba(255,255,255,0.07)" : "rgba(255,255,255,0.46)";
      ctx.fillRect(90, noteTop, 900, noteHeight);
      ctx.strokeStyle = tpl.id === "ink" ? "rgba(193,166,121,0.6)" : "rgba(126,133,142,0.45)";
      ctx.strokeRect(90, noteTop, 900, noteHeight);

      ctx.fillStyle = tpl.accent;
      ctx.font = "30px 'Noto Serif SC', serif";
      ctx.fillText(`Teacher's Note · ${today.teacher_note.keyword}`, 110, noteTitleY);
      ctx.fillStyle = tpl.en;
      ctx.font = "28px 'Noto Serif SC', serif";
      drawLines(ctx, noteLines, 110, noteTextY, 46);

      const footerTop = Math.max(noteEndY + 70, 980);
      ctx.strokeStyle = tpl.qrStroke;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(90, footerTop - 24);
      ctx.lineTo(990, footerTop - 24);
      ctx.stroke();

      if (Array.isArray(today.tags) && today.tags.length) {
        const tagsText = `# ${today.tags.join("   # ")}`;
        ctx.fillStyle = tpl.accent;
        ctx.font = "28px 'Noto Serif SC', serif";
        ctx.fillText(tagsText, 90, footerTop + 20);
      }

      ctx.fillStyle = tpl.en;
      ctx.font = "26px 'Noto Serif SC', serif";
      ctx.fillText(`Theme · ${today.theme || "Daily"}`, 90, footerTop + 68);
      ctx.fillText("hervoice daily", 90, footerTop + 112);

      const qr = new Image();
      qr.crossOrigin = "anonymous";
      qr.src = qrUrl;
      await qr.decode().catch(() => {});
      if (qr.naturalWidth) {
        ctx.drawImage(qr, 820, footerTop + 8, 170, 170);
      } else {
        ctx.strokeStyle = tpl.qrStroke;
        ctx.strokeRect(820, footerTop + 8, 170, 170);
        ctx.fillStyle = tpl.qrStroke;
        ctx.font = "26px serif";
        ctx.fillText("SCAN", 857, footerTop + 104);
      }

      const url = canvas.toDataURL("image/png");
      refs.posterImage.src = url;
      refs.posterWrap.classList.add("show");
      refs.downloadPoster.dataset.url = url;
    }

    refs.makePoster.addEventListener("click", generatePoster);
    refs.downloadPoster.addEventListener("click", () => {
      const url = refs.downloadPoster.dataset.url;
      if (!url) {
        alert("请先生成日签海报");
        return;
      }
      const a = document.createElement("a");
      a.href = url;
      a.download = `hervoice-${entries[index].date}.png`;
      a.click();
    });

    function applyEntries(list) {
      entries = Array.isArray(list) && list.length ? list : embeddedEntries;
      const firstDayKey = "2026-02-18";
      const todayStr = new Date().toISOString().slice(0, 10);
      const firstDayHit = entries.findIndex((item) => item.date === firstDayKey);
      const todayHit = entries.findIndex((item) => item.date === todayStr);
      index = firstDayHit >= 0 ? firstDayHit : (todayHit >= 0 ? todayHit : 0);
      render();
    }

    fetch(dataUrl)
      .then((res) => res.json())
      .then((data) => applyEntries(data))
      .catch(() => applyEntries(embeddedEntries));
  </script>
</body>
