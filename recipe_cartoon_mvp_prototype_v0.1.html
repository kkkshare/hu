<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>今天吃啥呀 - 菜谱小程序MVP</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Patrick+Hand&family=ZCOOL+KuaiLe&display=swap");

    :root {
      --bg-paper: #fff8eb;
      --ink: #42322a;
      --accent: #ff8b61;
      --accent-2: #ffd166;
      --mint: #c9f2dd;
      --card: #fffef8;
      --line: #5a4338;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      font-family: "Patrick Hand", "ZCOOL KuaiLe", cursive;
      background:
        radial-gradient(circle at 12% 18%, #ffe7cb 0, #ffe7cb 8%, transparent 9%),
        radial-gradient(circle at 88% 14%, #ffe0ec 0, #ffe0ec 9%, transparent 10%),
        radial-gradient(circle at 80% 88%, #dff6ff 0, #dff6ff 11%, transparent 12%),
        var(--bg-paper);
      min-height: 100vh;
    }

    .wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 20px 14px 36px;
    }

    .hero {
      border: 3px solid var(--line);
      border-radius: 22px;
      padding: 18px 16px;
      background: linear-gradient(145deg, #fff6d9, #fff1e4);
      box-shadow: 5px 6px 0 #f4d8aa;
    }

    h1 {
      margin: 0 0 6px;
      font-family: "ZCOOL KuaiLe", cursive;
      font-size: clamp(28px, 5vw, 42px);
    }

    .subtitle {
      margin: 0;
      font-size: 21px;
      opacity: 0.9;
    }

    .panel {
      margin-top: 16px;
      border: 3px dashed var(--line);
      border-radius: 18px;
      background: var(--card);
      padding: 14px;
    }

    .upload-area {
      display: grid;
      gap: 12px;
      grid-template-columns: 1fr auto;
      align-items: center;
    }

    .upload-area input { width: 100%; }

    button {
      border: 3px solid var(--line);
      border-radius: 14px;
      font-family: inherit;
      font-size: 20px;
      padding: 10px 14px;
      cursor: pointer;
      background: var(--accent-2);
      color: var(--ink);
      box-shadow: 3px 4px 0 #d9b555;
      transition: 120ms ease;
    }

    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(1px); box-shadow: 1px 1px 0 #d9b555; }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .chip {
      border: 2px solid var(--line);
      border-radius: 999px;
      padding: 4px 12px;
      font-size: 20px;
      background: var(--mint);
    }

    .recipes {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 12px;
      margin-top: 14px;
    }

    .recipe-card {
      border: 3px solid var(--line);
      border-radius: 16px;
      padding: 10px;
      background: #fffdf6;
      box-shadow: 4px 5px 0 #eed9c8;
    }

    .recipe-doodle {
      width: 100%;
      height: 130px;
      border: 2px dashed #b48f7a;
      border-radius: 12px;
      background: repeating-linear-gradient(
        -20deg,
        #fff4e6,
        #fff4e6 10px,
        #fff9f1 10px,
        #fff9f1 20px
      );
      display: grid;
      place-items: center;
      font-size: 44px;
    }

    .recipe-card h3 {
      margin: 8px 0 4px;
      font-size: 24px;
      font-family: "ZCOOL KuaiLe", cursive;
    }

    .meta {
      margin: 0 0 6px;
      font-size: 18px;
      opacity: 0.88;
    }

    .steps {
      margin: 0;
      padding-left: 20px;
      font-size: 19px;
      line-height: 1.35;
    }

    .step-item {
      margin-bottom: 6px;
    }

    .step-actions {
      margin-top: 3px;
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
    }

    .timer-btn {
      border: 2px solid var(--line);
      border-radius: 10px;
      font-size: 15px;
      padding: 2px 8px;
      background: #ffe3a6;
      box-shadow: none;
    }

    .timer-status {
      font-size: 15px;
      opacity: 0.88;
    }

    .heat-badge {
      display: inline-block;
      border: 2px solid var(--line);
      border-radius: 999px;
      padding: 1px 8px;
      background: #ffd7c5;
      font-size: 14px;
      line-height: 1.3;
    }

    .detail-box {
      margin-top: 8px;
      border: 2px dashed #caa484;
      border-radius: 10px;
      padding: 8px;
      background: #fff7ec;
      font-size: 17px;
      line-height: 1.35;
    }

    .detail-title {
      margin: 0 0 2px;
      font-family: "ZCOOL KuaiLe", cursive;
      font-size: 18px;
    }

    .archive-toolbar {
      display: grid;
      gap: 10px;
      grid-template-columns: 1fr 1fr auto;
      align-items: center;
    }

    .archive-toolbar input[type="text"] {
      width: 100%;
      border: 2px solid var(--line);
      border-radius: 12px;
      padding: 8px 10px;
      font-family: inherit;
      font-size: 19px;
      background: #fff;
    }

    .archive-grid {
      margin-top: 12px;
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    }

    .archive-card {
      border: 3px solid var(--line);
      border-radius: 14px;
      background: #fffef9;
      overflow: hidden;
      box-shadow: 3px 4px 0 #ecd7bf;
    }

    .archive-card img {
      display: block;
      width: 100%;
      height: 130px;
      object-fit: cover;
      border-bottom: 2px dashed #b48f7a;
    }

    .archive-info {
      padding: 8px 10px 10px;
    }

    .archive-title {
      margin: 0;
      font-family: "ZCOOL KuaiLe", cursive;
      font-size: 22px;
    }

    .archive-time {
      margin: 3px 0 0;
      font-size: 16px;
      opacity: 0.85;
    }

    @media (max-width: 640px) {
      .upload-area { grid-template-columns: 1fr; }
      .archive-toolbar { grid-template-columns: 1fr; }
      button { width: 100%; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <h1>今天吃啥呀</h1>
      <p class="subtitle">拍一下冰箱食材，给你配好今晚三道家常菜</p>
    </section>

    <section class="panel">
      <div class="upload-area">
        <input id="photo" type="file" accept="image/*" />
        <button id="scanBtn">拍照识别食材</button>
      </div>
      <div id="ingredients" class="chips"></div>
      <div style="margin-top: 12px;">
        <button id="genBtn">生成今日菜谱</button>
      </div>
    </section>

    <section id="result" class="recipes"></section>

    <section class="panel">
      <h2 style="margin:0 0 8px; font-family:'ZCOOL KuaiLe', cursive;">我的成品存档</h2>
      <div class="archive-toolbar">
        <input id="dishName" type="text" placeholder="输入菜名（如：番茄炒蛋）" />
        <input id="donePhoto" type="file" accept="image/*" />
        <button id="saveDishBtn">上传存档</button>
      </div>
      <div id="archiveGrid" class="archive-grid"></div>
    </section>
  </main>

  <script>
    const sampleSets = [
      ["番茄", "鸡蛋", "土豆", "青椒", "葱"],
      ["豆腐", "香菇", "西兰花", "胡萝卜", "蒜"],
      ["鸡腿", "洋葱", "土豆", "胡萝卜", "姜"]
    ];

    const recipePool = [
      {
        name: "番茄炒蛋",
        time: "10分钟",
        level: "新手",
        doodle: "🍳",
        prep: "番茄2个，鸡蛋3个，葱花少许",
        seasoning: "盐1/2勺，糖1/3勺，生抽1勺",
        stepTimes: [40, 60, 120, 30],
        stepHeats: ["中火", "中火", "中火", "小火"],
        steps: [
          "鸡蛋加1勺清水和少许盐打散，番茄切滚刀块。",
          "热锅下油，中火把鸡蛋炒到8成熟，马上盛出。",
          "补少许油，下番茄和糖，中火炒到出汁。",
          "倒回鸡蛋翻炒30秒，沿锅边淋生抽，撒葱花出锅。"
        ],
        tip: "鸡蛋别炒老，最后回锅 30 秒最嫩。"
      },
      {
        name: "青椒土豆丝",
        time: "12分钟",
        level: "新手",
        doodle: "🥔",
        prep: "土豆1个，青椒1个，蒜2瓣",
        seasoning: "盐1/2勺，白醋1勺，生抽1/2勺",
        stepTimes: [300, 10, 60, 20],
        stepHeats: ["无火", "中火", "大火", "大火"],
        steps: [
          "土豆切细丝后泡清水5分钟，去掉多余淀粉。",
          "锅热后下油和蒜末，中火炒香10秒。",
          "先下土豆丝大火快炒1分钟，再下青椒丝。",
          "加盐和生抽，最后淋白醋，翻炒20秒即可。"
        ],
        tip: "土豆丝一定先泡水，口感才脆爽不粘锅。"
      },
      {
        name: "香菇豆腐煲",
        time: "15分钟",
        level: "新手",
        doodle: "🍲",
        prep: "老豆腐1块，香菇5朵，蒜2瓣",
        seasoning: "生抽1勺，蚝油1勺，盐少许",
        stepTimes: [60, 120, 60, 300],
        stepHeats: ["无火", "小火", "中火", "中小火"],
        steps: [
          "豆腐切块，香菇切片，蒜切末。",
          "平底锅少油，小火把豆腐两面煎到微黄。",
          "另起锅炒香蒜末，加入香菇翻炒出香味。",
          "放入豆腐，加半碗水和调味料，中小火焖5分钟收汁。"
        ],
        tip: "豆腐先煎后焖，不容易碎，汤汁也更香。"
      },
      {
        name: "胡萝卜炖鸡腿",
        time: "20分钟",
        level: "进阶",
        doodle: "🍗",
        prep: "鸡腿2只，胡萝卜1根，姜3片",
        seasoning: "生抽1勺，老抽1/3勺，盐少许",
        stepTimes: [60, 80, 40, 720],
        stepHeats: ["无火", "中火", "中火", "小火"],
        steps: [
          "鸡腿冷水下锅焯1分钟，捞出冲净血沫。",
          "热锅下少油和姜片，中火煸香后下鸡腿翻炒。",
          "加生抽和老抽上色，再下胡萝卜块炒匀。",
          "加没过食材的热水，小火炖12分钟，开大火收汁。"
        ],
        tip: "收汁别收太干，留少量汤拌饭更好吃。"
      },
      {
        name: "蒜蓉西兰花",
        time: "8分钟",
        level: "新手",
        doodle: "🥦",
        prep: "西兰花1颗，蒜3瓣",
        seasoning: "盐1/3勺，生抽1/2勺，香油几滴",
        stepTimes: [180, 30, 10, 40],
        stepHeats: ["无火", "大火", "小火", "大火"],
        steps: [
          "西兰花掰小朵，盐水浸泡3分钟后洗净。",
          "水开后加1滴油，西兰花焯30秒捞出。",
          "热锅下油，小火炒香蒜末10秒。",
          "倒入西兰花转大火快炒，调味后滴香油出锅。"
        ],
        tip: "焯水时间别超过30秒，颜色会更翠绿。"
      }
    ];
    const ARCHIVE_KEY = "recipe_cartoon_done_archive_v1";

    function renderIngredients(items) {
      const box = document.getElementById("ingredients");
      box.innerHTML = items.map((x) => `<span class="chip">${x}</span>`).join("");
    }

    function renderRecipes() {
      const selected = [...recipePool].sort(() => Math.random() - 0.5).slice(0, 3);
      const el = document.getElementById("result");
      el.innerHTML = selected.map((r) => `
        <article class="recipe-card">
          <div class="recipe-doodle">${r.doodle}</div>
          <h3>${r.name}</h3>
          <p class="meta">耗时 ${r.time} · 难度 ${r.level}</p>
          <div class="detail-box">
            <p class="detail-title">备料</p>
            <div>${r.prep}</div>
          </div>
          <div class="detail-box">
            <p class="detail-title">调味</p>
            <div>${r.seasoning}</div>
          </div>
          <ol class="steps">${r.steps.map((s, idx) => `
            <li class="step-item">
              <div>${s}</div>
              <div class="step-actions">
                <span class="heat-badge">火候：${(r.stepHeats && r.stepHeats[idx]) || "中火"}</span>
                <button class="timer-btn" data-seconds="${r.stepTimes[idx] || 60}">开始计时</button>
                <span class="timer-status">建议 ${r.stepTimes[idx] || 60} 秒</span>
              </div>
            </li>
          `).join("")}</ol>
          <div class="detail-box">
            <p class="detail-title">小贴士</p>
            <div>${r.tip}</div>
          </div>
        </article>
      `).join("");
    }

    function readArchive() {
      try {
        return JSON.parse(localStorage.getItem(ARCHIVE_KEY) || "[]");
      } catch (_err) {
        return [];
      }
    }

    function writeArchive(list) {
      localStorage.setItem(ARCHIVE_KEY, JSON.stringify(list.slice(0, 24)));
    }

    function renderArchive() {
      const list = readArchive();
      const el = document.getElementById("archiveGrid");
      if (!list.length) {
        el.innerHTML = `<div class="chip">还没有存档，先上传一张吧～</div>`;
        return;
      }
      el.innerHTML = list.map((item) => `
        <article class="archive-card">
          <img src="${item.image}" alt="${item.name}" />
          <div class="archive-info">
            <p class="archive-title">${item.name}</p>
            <p class="archive-time">${item.time}</p>
          </div>
        </article>
      `).join("");
    }

    document.getElementById("scanBtn").addEventListener("click", () => {
      const items = sampleSets[Math.floor(Math.random() * sampleSets.length)];
      renderIngredients(items);
    });

    document.getElementById("genBtn").addEventListener("click", renderRecipes);
    document.getElementById("result").addEventListener("click", (event) => {
      const btn = event.target.closest(".timer-btn");
      if (!btn) return;
      if (btn.dataset.running === "1") return;
      let remain = Number(btn.dataset.seconds || 60);
      const statusEl = btn.nextElementSibling;
      btn.dataset.running = "1";
      btn.textContent = "计时中...";
      const timerId = setInterval(() => {
        remain -= 1;
        if (remain <= 0) {
          clearInterval(timerId);
          btn.dataset.running = "0";
          btn.textContent = "再计一次";
          statusEl.textContent = "时间到啦，可以进入下一步";
          return;
        }
        statusEl.textContent = `剩余 ${remain} 秒`;
      }, 1000);
    });
    document.getElementById("saveDishBtn").addEventListener("click", () => {
      const name = document.getElementById("dishName").value.trim() || "今日成品";
      const file = document.getElementById("donePhoto").files[0];
      if (!file) {
        alert("先选一张成品照片哦");
        return;
      }
      const reader = new FileReader();
      reader.onload = () => {
        const list = readArchive();
        list.unshift({
          name,
          image: reader.result,
          time: new Date().toLocaleString("zh-CN", { hour12: false })
        });
        writeArchive(list);
        renderArchive();
        document.getElementById("dishName").value = "";
        document.getElementById("donePhoto").value = "";
      };
      reader.readAsDataURL(file);
    });

    renderIngredients(sampleSets[0]);
    renderRecipes();
    renderArchive();
  </script>
</body>
</html>
