<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>胡老师的小课堂 - 首页</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root {
            --primary-grad: linear-gradient(135deg, #6dd5ed, #2193b0);
            --secondary-grad: linear-gradient(135deg, #ff9966, #ff5e62);
            --bg-color: #f8fafc;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --card-radius: 24px;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(#e2e8f0 1px, transparent 1px);
            background-size: 20px 20px;
            font-family: 'PingFang SC', system-ui, -apple-system, sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: white;
            padding: 4rem 0 3rem;
            text-align: center;
            border-bottom: 1px solid #e2e8f0;
            margin-bottom: 4rem;
        }

        .welcome-title {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(to right, #2193b0, #ff5e62);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .grade-section {
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 24px;
            border-radius: 2px;
        }

        .g5-title::before { background: #2193b0; }
        .g3-title::before { background: #ff5e62; }

        /* 统一卡片样式 */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .col-span-2 {
            grid-column: span 2;
        }

        .nav-card {
            background: white;
            border-radius: var(--card-radius);
            padding: 1.5rem;
            text-decoration: none;
            color: inherit;
            border: 1px solid #e2e8f0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .nav-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            border-color: #cbd5e1;
        }

        .nav-card.featured {
            flex-direction: row;
            justify-content: flex-start;
            text-align: left;
            padding: 2rem;
        }

        .icon-box {
            width: 60px;
            height: 60px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin-bottom: 1rem;
            transition: transform 0.3s;
        }

        .featured .icon-box {
            margin-bottom: 0;
            margin-right: 1.5rem;
            width: 70px;
            height: 70px;
            font-size: 2.5rem;
        }

        .nav-card:hover .icon-box {
            transform: scale(1.1) rotate(5deg);
        }

        .g5-bg { background: #f0f9ff; color: #0369a1; }
        .g3-bg { background: #fff7ed; color: #9a3412; }

        .card-info h3 {
            font-size: 1.25rem;
            font-weight: 700;
            margin: 0 0 0.25rem 0;
        }

        .card-info p {
            font-size: 0.875rem;
            color: var(--text-muted);
            margin: 0;
        }

        .badge {
            font-size: 0.75rem;
            padding: 4px 12px;
            border-radius: 50px;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .footer {
            margin-top: auto;
            padding: 4rem 0 2rem;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.875rem;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="container">
            <h1 class="welcome-title">胡老师的小课堂</h1>
            <p class="text-muted">专注五年级 & 三年级精品复习资料</p>
        </div>
    </div>

    <div class="container mb-5">
        <a href="test_reading_club.html" class="nav-card featured animate__animated animate__fadeIn" style="background: linear-gradient(135deg, #2d5a27, #6a994e); color: white; border: none;">
            <div class="icon-box" style="background: rgba(255,255,255,0.2); color: white;">🌟</div>
            <div class="card-info">
                <span class="badge" style="background: #f4a261; color: white;">寒假特辑</span>
                <h3 style="color: white;">寒假绘本悦读馆</h3>
                <p style="color: rgba(255,255,255,0.8);">分级绘本阅读、边听边读、打卡积分赢奖励！</p>
            </div>
        </a>
    </div>

    <div class="container">
        <div class="row g-5">
            <!-- 五年级板块 -->
            <div class="col-lg-6">
                <div class="grade-section">
                    <h2 class="section-title g5-title">五年级 English</h2>
                    
                    <div class="card-grid">
                        <a href="test_pep5_english.html" class="nav-card featured col-span-2">
                            <div class="icon-box g5-bg">🇬🇧</div>
                            <div class="card-info">
                                <span class="badge g5-bg">核心资料</span>
                                <h3>PEP五年级上册复习</h3>
                                <p>全单元单词、句子及作文复习</p>
                            </div>
                        </a>

                        <a href="word_game.html" class="nav-card">
                            <div class="icon-box g5-bg" style="font-size: 1.5rem;">🧩</div>
                            <div class="card-info">
                                <h3>词汇大比拼</h3>
                                <p>单词连连看</p>
                            </div>
                        </a>

                        <a href="thinking_camp.html" class="nav-card">
                            <div class="icon-box g5-bg" style="font-size: 1.5rem;">🕵️</div>
                            <div class="card-info">
                                <h3>思维逻辑训练</h3>
                                <p>小小侦探闯关</p>
                            </div>
                        </a>
                    </div>
                </div>
            </div>

            <!-- 三年级板块 -->
            <div class="col-lg-6">
                <div class="grade-section">
                    <h2 class="section-title g3-title">三年级 综合备考</h2>
                    
                    <div class="card-grid">
                        <a href="grade3_exam.html" class="nav-card featured col-span-2">
                            <div class="icon-box g3-bg">🏫</div>
                            <div class="card-info">
                                <span class="badge g3-bg">最新上线</span>
                                <h3>三年级期末大冲刺</h3>
                                <p>精选近/反义词与成语核心考点</p>
                            </div>
                        </a>

                        <a href="grade3_exam.html#syn-zone" class="nav-card">
                            <div class="icon-box g3-bg" style="font-size: 1.5rem;">🌓</div>
                            <div class="card-info">
                                <h3>近/反义词</h3>
                                <p>词汇大作战</p>
                            </div>
                        </a>

                        <a href="grade3_exam.html#idiom-zone" class="nav-card">
                            <div class="icon-box g3-bg" style="font-size: 1.5rem;">🧠</div>
                            <div class="card-info">
                                <h3>成语闯关</h3>
                                <p>智慧大挑战</p>
                            </div>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="footer">
        <p>&copy; 2026 胡老师的小课堂 | 陪宝贝一起快乐成长</p>
    </div>
</body>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</script>

</body>
</html>
